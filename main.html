<!DOCTYPE html>
<html>
<head>
<title>Nested Tables</title>
<style>
table, th, td {
  border: 1px solid black;
  border-collapse: collapse;
  padding: 6px;
}
</style>
</head>

<body>

<table>
<tr>

<!-- Nested Table 1 -->
<td>
<table>
<tr>
<th>Nested Table 1</th>
</tr>
<tr>
<td>
<ul>
<li>List item 1</li>
<li>List item 2</li>
<li>List item 3</li>
</ul>
</td>
</tr>
</table>
</td>

<!-- Nested Table 2 -->
<td>
<table>
<tr>
<th>Nested Table 2</th>
<th>Column 1</th>
<th>Column 2</th>
</tr>
<tr>
<td>Row 1</td>
<td>Data 1</td>
<td>Data 2</td>
</tr>
<tr>
<td>Row 2</td>
<td>Data 3</td>
<td>Data 4</td>
</tr>
</table>
</td>

</tr>

<tr>

<!-- Nested Table 3 -->
<td>
<table>
<tr>
<th>Nested Table 3</th>
</tr>
<tr>
<td style="background-color:black; color:white;">HTML</td>
</tr>
</table>
</td>

<!-- Nested Table 4 -->
<td>
<table>
<tr>
<th>Nested Table 4</th>
</tr>
<tr>
<td>Cell 1</td>
</tr>
<tr>
<td>Cell 2</td>
</tr>
</table>
</td>

</tr>

</table>

</body>
</html>
